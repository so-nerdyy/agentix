name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  validate:
    name: Build, test, and release smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Release smoke
        run: npm run smoke:release

      - name: Shell installer dry run
        if: runner.os != 'Windows'
        run: AGENTIX_DRY_RUN=1 AGENTIX_SKIP_SETUP=1 sh install.sh

      - name: PowerShell installer dry run
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\install.ps1 -DryRun -SkipSetup

  docker:
    name: Docker validation
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Agentix runtime image
        run: docker build -t agentix:ci .

      - name: Validate Agentix compose
        run: docker compose -f docker-compose.yml config
        env:
          AGENTIX_SESSION_TOKEN: ci-token

      - name: Build Hermes frontend image
        run: docker build -f hermes-agent/Dockerfile hermes-agent

      - name: Validate Linux compose
        run: docker compose -f hermes-agent/docker-compose.yml config

      - name: Validate Windows compose
        run: docker compose -f hermes-agent/docker-compose.windows.yml config
