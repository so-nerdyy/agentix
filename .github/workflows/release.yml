name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish npm package and release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AGENTIX_HAS_LLM_KEY: ${{ secrets.AGENTIX_LLM_API_KEY != '' || secrets.KILOCODE_API_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Release preflight
        if: startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 5
        shell: bash
        run: |
          if [ "${AGENTIX_HAS_LLM_KEY}" = "true" ]; then
            npm run release:preflight -- --require-llm
          else
            npm run release:preflight
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          AGENTIX_LLM_API_KEY: ${{ secrets.AGENTIX_LLM_API_KEY || secrets.KILOCODE_API_KEY }}

      - name: Build
        run: npm run build

      - name: Unit tests
        timeout-minutes: 10
        run: npm test

      - name: Release smoke
        timeout-minutes: 25
        run: npm run smoke:release

      - name: Generate release manifest
        timeout-minutes: 5
        run: npm run release:manifest

      - name: Validate npm authentication
        if: startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 5
        shell: bash
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is required to publish @nerdyy/agentix."
            exit 1
          fi
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm with provenance
        if: startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 10
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .release/*.tgz
            .release/*-manifest.json

      - name: Verify published release
        if: startsWith(github.ref, 'refs/tags/')
        timeout-minutes: 20
        shell: bash
        run: |
          mkdir -p data/release
          for attempt in 1 2 3 4 5; do
            if npm run release:verify -- --out data/release/public-release-proof.json; then
              exit 0
            fi
            echo "release verification attempt ${attempt} failed; retrying after registry/release propagation"
            sleep 30
          done
          npm run release:verify -- --out data/release/public-release-proof.json

      - name: Verify live LLM provider
        if: startsWith(github.ref, 'refs/tags/') && env.AGENTIX_HAS_LLM_KEY == 'true'
        timeout-minutes: 5
        run: npm run verify:llm -- --out data/release/live-llm-proof.json
        env:
          AGENTIX_LLM_API_KEY: ${{ secrets.AGENTIX_LLM_API_KEY || secrets.KILOCODE_API_KEY }}
          AGENTIX_PROVIDER: ${{ vars.AGENTIX_PROVIDER || 'openai' }}
          AGENTIX_MODEL: ${{ vars.AGENTIX_MODEL || 'gpt-4o-mini' }}
          AGENTIX_BASE_URL: ${{ vars.AGENTIX_BASE_URL }}

      - name: Upload readiness proofs as workflow artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: agentix-readiness-proofs
          path: data/release/*.json
          if-no-files-found: error

      - name: Upload readiness proofs to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: data/release/*.json
